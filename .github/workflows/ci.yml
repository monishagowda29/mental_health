name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Syntax check — app.py
        run: python -m py_compile app.py

      - name: Syntax check — src modules
        run: python -m py_compile src/config.py src/services/bert.py src/services/translation.py src/services/vision.py src/ui/strings.py src/ui/styles.py src/ui/tabs/text_tab.py src/ui/tabs/image_tab.py src/ui/tabs/batch_tab.py
