name: MindScan Backend CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax Compile check
        run: |
          python -m py_compile app.py
          python -m py_compile src/config.py src/services/bert.py src/services/translation.py src/services/vision.py src/ui/strings.py src/ui/styles.py
          find app -name "*.py" | xargs python -m py_compile

  unit-tests:
    needs: lint-and-syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest cryptography

      - name: Run Pytest suite
        run: pytest tests/ -v --tb=short

  integration-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install cryptography

      - name: Run Custom Integration Test Suite
        run: python tests/run_tests.py
